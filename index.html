<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorteo — La Ciudad Corre 6ta Edición</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #060a18;
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ---- HERO: imagen completa ---- */
  .hero {
    width: 100%;
    max-width: 480px;
    position: relative;
    overflow: hidden;
  }
  .hero-img {
    width: 100%;
    display: block;
    object-fit: cover;
  }
  /* fade suave al fondo oscuro */
  .hero-fade {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 80px;
    background: linear-gradient(to bottom, transparent, #060a18);
    pointer-events: none;
  }

  /* ---- SEPARADOR ---- */
  .sep {
    width: 100%;
    max-width: 480px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(58,219,58,0.2), transparent);
  }

  /* ---- FORM ---- */
  .form-section {
    width: 100%;
    max-width: 480px;
    padding: 28px 24px 52px;
  }
  .form-intro {
    text-align: center;
    margin-bottom: 24px;
    color: rgba(255,255,255,0.4);
    font-size: 14px;
    line-height: 1.65;
  }
  .field { margin-bottom: 14px; }
  .field label {
    display: block;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    color: #3adb3a;
    margin-bottom: 6px;
  }
  .field input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(58,219,58,0.18);
    border-radius: 6px;
    padding: 13px 16px;
    font-family: 'Barlow', sans-serif;
    font-size: 15px;
    color: #ffffff;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    -webkit-appearance: none;
  }
  .field input::placeholder { color: rgba(255,255,255,0.16); }
  .field input:focus {
    border-color: #3adb3a;
    background: rgba(58,219,58,0.05);
  }
  .btn-submit {
    width: 100%;
    margin-top: 10px;
    background: #3adb3a;
    color: #060a18;
    border: none;
    border-radius: 6px;
    padding: 16px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 20px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .btn-submit:hover { background: #50e850; }
  .btn-submit:active { transform: scale(0.98); }
  .btn-submit:disabled { background: #1a4a1a; color: rgba(0,0,0,0.3); cursor: not-allowed; }

  .status {
    margin-top: 14px;
    text-align: center;
    font-size: 14px;
    min-height: 20px;
    border-radius: 6px;
    transition: all 0.3s;
  }
  .status.error {
    background: rgba(220,50,50,0.1);
    border: 1px solid rgba(220,50,50,0.3);
    color: #ff7070;
    padding: 12px 16px;
  }
  .status.sending {
    color: rgba(255,255,255,0.35);
    padding: 8px 0;
  }

  /* ---- SUCCESS ---- */
  .success-screen {
    display: none;
    text-align: center;
    padding: 60px 28px;
    max-width: 480px;
    width: 100%;
  }
  .success-icon { font-size: 64px; margin-bottom: 16px; }
  .divider {
    width: 40px; height: 3px;
    background: #3adb3a;
    margin: 0 auto 20px;
    border-radius: 2px;
  }
  .success-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 34px;
    color: #3adb3a;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }
  .success-text {
    color: rgba(255,255,255,0.45);
    font-size: 15px;
    line-height: 1.7;
  }
  .footer-note {
    text-align: center;
    font-size: 11px;
    color: rgba(255,255,255,0.12);
    padding: 0 24px 28px;
    letter-spacing: 0.5px;
  }
</style>
</head>

<div class="sep"></div>

<div class="form-section" id="form-section">
  <p class="form-intro">Sporting sortea cupos para La Ciudad Corre.<br>Completá tus datos y entrá en el sorteo.</p>

  <div class="field">
    <label for="nombre">Nombre y apellido</label>
    <input type="text" id="nombre" placeholder="Ej: Juan Pérez" autocomplete="name">
  </div>
  <div class="field">
    <label for="dni">DNI</label>
    <input type="text" id="dni" placeholder="Sin puntos" inputmode="numeric" maxlength="9">
  </div>
  <div class="field">
    <label for="email">Email</label>
    <input type="email" id="email" placeholder="tu@email.com" autocomplete="email" inputmode="email">
  </div>
  <div class="field">
    <label for="telefono">Teléfono / WhatsApp</label>
    <input type="tel" id="telefono" placeholder="Ej: 2614123456" inputmode="numeric" autocomplete="tel">
  </div>

  <button class="btn-submit" id="btn" onclick="enviar()">Participar del sorteo</button>
  <div class="status" id="status"></div>
</div>

<div class="success-screen" id="success-screen">
  <div class="success-icon">🏃</div>
  <div class="divider"></div>
  <div class="success-title">¡Ya estás participando!</div>
  <div class="success-text">
    Recibimos tu inscripción al sorteo.<br>
    Si resultás ganador te vamos a contactar<br>por WhatsApp o email. ¡Mucha suerte!
  </div>
</div>

<p class="footer-note">Sporting — Sponsor Principal · La Ciudad Corre 6ta Edición</p>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxhcpztuIpxXKnkS4k8T4M8u-HsXiNAEjs7ID32LHE_W-styP4OvxuNJkMWmIopobeE/exec';

function enviar() {
  const nombre = document.getElementById('nombre').value.trim();
  const dni = document.getElementById('dni').value.trim();
  const email = document.getElementById('email').value.trim();
  const telefono = document.getElementById('telefono').value.trim();
  const status = document.getElementById('status');
  const btn = document.getElementById('btn');

  if (!nombre || !dni || !email || !telefono) {
    status.className = 'status error';
    status.textContent = 'Por favor completá todos los campos.';
    return;
  }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    status.className = 'status error';
    status.textContent = 'Ingresá un email válido.';
    return;
  }

  btn.disabled = true;
  status.className = 'status sending';
  status.textContent = 'Enviando...';

  fetch(SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ nombre, dni, email, telefono })
  })
  .then(() => {
    document.getElementById('form-section').style.display = 'none';
    document.getElementById('success-screen').style.display = 'block';
  })
  .catch(() => {
    status.className = 'status error';
    status.textContent = 'Ocurrió un error. Intentá de nuevo.';
    btn.disabled = false;
  });
}
</script>
